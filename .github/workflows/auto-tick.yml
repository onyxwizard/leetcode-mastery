name: Auto-Update LeetCode Tracker

on:
  push:
    branches:
      - main
      - master

jobs:
  update-readme:
    name: Update Progress Tracker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Get changed files
        run: |
          # Get files changed in the latest commit, separated by spaces
          # This is 100% reliable for all commit types (initial, merge, normal)
          FILES=$(git log -1 --name-only --pretty=format: | tr '\n' ' ')
          echo "CHANGED_FILES=$FILES" >> $GITHUB_ENV
          echo "🔍 Detected changed files: $FILES"

      - name: Run Tracker Updater Script
        run: python .github/scripts/update_tracker.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update progress tracker [skip ci]"
            git push
            echo "✅ README updated and pushed successfully!"
          else
            echo "ℹ️ No matching LeetCode problems found in this commit."
          fi
